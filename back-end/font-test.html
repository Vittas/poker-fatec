<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Poker Test</title>
</head>
<body>

  <input id="name" placeholder="Seu nome">
  <button onclick="connect()">Entrar</button>

  <br><br>

  <button onclick="sendAction('CALL')">CALL</button>
  <button onclick="sendAction('FOLD')">FOLD</button>
  <button onclick="raiseBet()">RAISE</button>

  <pre id="log"></pre>

  <script>
    let socket

    function log(message) {
      document.getElementById("log").textContent += message + "\\n"
    }

    function connect() {
      const name = document.getElementById("name").value

      socket = new WebSocket("ws://localhost:8080/ws/test-room")

      socket.onopen = () => {
        log("Conectado")

        socket.send(JSON.stringify({
          type: "JOIN",
          name: name
        }))
      }

      socket.onmessage = (event) => {
        log(event.data)
      }

      socket.onclose = () => {
        log("Desconectado")
      }
    }

    function sendAction(action) {
      socket.send(JSON.stringify({
        type: "ACTION",
        action: action
      }))
    }

    function raiseBet() {
      socket.send(JSON.stringify({
        type: "ACTION",
        action: "RAISE",
        amount: 100
      }))
    }
  </script>

</body>
</html>
