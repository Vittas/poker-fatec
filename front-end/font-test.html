<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Poker Test - Mesa Virtual</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a3d2f 0%, #1a5c48 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #ffd700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      color: #b8e0d2;
      font-size: 1.1rem;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 30px;
    }

    @media (max-width: 900px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    /* Painel de Controle */
    .control-panel {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 25px;
    }

    .control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #b8e0d2;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(255, 255, 255, 0.15);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(to right, #ffd700, #ffaa00);
      color: #0a3d2f;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
    }

    .btn-danger {
      background: linear-gradient(to right, #ff416c, #ff4b2b);
      color: white;
    }

    .btn-danger:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
    }

    .btn-success {
      background: linear-gradient(to right, #00b09b, #96c93d);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 176, 155, 0.4);
    }

    /* Área do Jogo */
    .game-area {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 25px;
    }

    .game-title {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #ffd700;
      text-align: center;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 25px;
    }

    .action-btn {
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Área de Chat */
    .chat-area {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    .chat-header {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #ffd700;
      text-align: center;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .message-system {
      background: rgba(255, 215, 0, 0.2);
      align-self: center;
      text-align: center;
      font-style: italic;
    }

    .message-other {
      background: rgba(255, 255, 255, 0.1);
      align-self: flex-start;
    }

    .message-self {
      background: rgba(0, 176, 155, 0.3);
      align-self: flex-end;
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 3px;
      color: #ffd700;
    }

    .chat-input {
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
    }

    /* Log de Eventos */
    .log-area {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      margin-top: 25px;
    }

    .log-header {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #ffd700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #log {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-wrap;
      color: #b8e0d2;
    }

    .clear-btn {
      padding: 8px 15px;
      font-size: 0.9rem;
    }

    /* Status de Conexão */
    .connection-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      padding: 10px 15px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff416c;
    }

    .status-indicator.connected {
      background: #00b09b;
      box-shadow: 0 0 10px #00b09b;
    }

    /* Mesa de Poker Visual */
    .poker-table {
      background: radial-gradient(circle, #1a5c48 0%, #0a3d2f 70%);
      border-radius: 50%;
      height: 300px;
      margin: 20px auto;
      position: relative;
      border: 15px solid #8b4513;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffd700;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .table-center {
      text-align: center;
      padding: 20px;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
      
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }
      
      .action-buttons {
        grid-template-columns: 1fr;
      }
      
      .poker-table {
        height: 200px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>♠️ ♥️ Poker Test ♣️ ♦️</h1>
      <p class="subtitle">Mesa virtual de poker - Conecte-se e jogue com amigos</p>
    </header>

    <div class="main-content">
      <div class="left-column">
        <div class="control-panel">
          <h2>Controle da Sala</h2>
          <div class="control-group">
            <div class="input-group">
              <label for="name">Seu Nome</label>
              <input id="name" type="text" placeholder="Digite seu nome para entrar">
            </div>
            <button class="btn btn-primary" onclick="connect()">
              <span>🎮</span> Entrar na Sala
            </button>
            <button class="btn btn-success" onclick="start()">
              <span>▶️</span> Iniciar Jogo
            </button>
          </div>
          
          <div class="connection-status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Desconectado</span>
          </div>
        </div>

        <div class="game-area">
          <h2 class="game-title">Mesa de Poker</h2>
          
          <div class="poker-table">
            <div class="table-center">
              <div id="tableInfo">Aguardando jogadores...</div>
              <div id="potInfo" style="margin-top: 10px; font-size: 1rem;">Pote: R$ 0</div>
            </div>
          </div>

          <div class="action-buttons">
            <button class="btn btn-success action-btn" onclick="sendAction('CALL')">
              <span>✓</span> CALL
            </button>
            <button class="btn btn-danger action-btn" onclick="sendAction('FOLD')">
              <span>✗</span> FOLD
            </button>
            <button class="btn btn-primary action-btn" onclick="raiseBet()">
              <span>↑</span> RAISE (R$ 100)
            </button>
          </div>
        </div>
      </div>

      <div class="right-column">
        <div class="chat-area">
          <h2 class="chat-header">💬 Chat da Sala</h2>
          <div class="chat-messages" id="chatMessages">
            <div class="message message-system">
              Bem-vindo à mesa de poker! Digite seu nome e clique em "Entrar na Sala".
            </div>
          </div>
          <div class="chat-input">
            <input id="chat" type="text" placeholder="Digite sua mensagem..." onkeypress="handleChatKeyPress(event)">
            <button class="btn btn-secondary" onclick="sendChat()">
              <span>📤</span> Enviar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="log-area">
      <div class="log-header">
        <span>📋 Log de Eventos</span>
        <button class="btn btn-secondary clear-btn" onclick="clearLog()">
          <span>🗑️</span> Limpar
        </button>
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <script>
    let socket
    let playerName = ""
    let serverurl = "paper-favourite-boutique-silly.trycloudflare.com"
    let roomId = "test-room"

    function log(message) {
      const logElement = document.getElementById("log")
      const timestamp = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      logElement.textContent += `[${timestamp}] ${message}\n`
      logElement.scrollTop = logElement.scrollHeight
    }

    function updateStatus(connected) {
      const indicator = document.getElementById("statusIndicator")
      const statusText = document.getElementById("statusText")
      
      if (connected) {
        indicator.className = "status-indicator connected"
        statusText.textContent = `Conectado como: ${playerName}`
      } else {
        indicator.className = "status-indicator"
        statusText.textContent = "Desconectado"
      }
    }

    function addChatMessage(sender, message, type = "other") {
      const chatMessages = document.getElementById("chatMessages")
      const messageDiv = document.createElement("div")
      messageDiv.className = `message message-${type}`
      
      const senderSpan = document.createElement("div")
      senderSpan.className = "message-sender"
      senderSpan.textContent = sender
      
      const messageContent = document.createElement("div")
      messageContent.textContent = message
      
      messageDiv.appendChild(senderSpan)
      messageDiv.appendChild(messageContent)
      chatMessages.appendChild(messageDiv)
      chatMessages.scrollTop = chatMessages.scrollHeight
    }

    function connect() {
      playerName = document.getElementById("name").value.trim()
      
      if (!playerName) {
        alert("Por favor, digite seu nome antes de entrar.")
        return
      }

      socket = new WebSocket("ws://"+serverurl+"/ws/"+roomId)

      socket.onopen = () => {
        log("Conectado ao servidor")
        updateStatus(true)
        
        socket.send(JSON.stringify({
          type: "JOIN",
          name: playerName
        }))
        
        addChatMessage("Sistema", `Você entrou na sala como ${playerName}`, "self")
      }

      socket.onmessage = (event) => {
        try {
          const obj = JSON.parse(event.data)

          if (obj.type === "CHAT") {
            const isSelf = obj.sender === playerName
            addChatMessage(obj.sender, obj.message, isSelf ? "self" : "other")
            return
          }

          if (obj.type === "CHAT_HISTORY") {
            obj.messages.forEach(m => {
              const isSelf = m.sender === playerName
              addChatMessage(m.sender, m.message, isSelf ? "self" : "other")
            })
            return
          }
          
          // Atualizar informações da mesa
          if (obj.type === "GAME_UPDATE") {
            updateTableInfo(obj)
            return
          }
        } catch (e) {
          // not JSON or unexpected shape, fall through
        }

        log(event.data)
      }

      socket.onclose = () => {
        log("Desconectado do servidor")
        updateStatus(false)
        addChatMessage("Sistema", "Você foi desconectado da sala", "system")
      }

      socket.onerror = (error) => {
        log("Erro na conexão: " + error)
        addChatMessage("Sistema", "Erro na conexão com o servidor", "system")
      }
    }

    function start() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Você precisa estar conectado primeiro!")
        return
      }
      
      socket.send(JSON.stringify({
        type: "START",
        start: true
      }))
      
      log("Solicitação para iniciar o jogo enviada")
    }

    function sendAction(action) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Você precisa estar conectado primeiro!")
        return
      }
      
      socket.send(JSON.stringify({
        type: "ACTION",
        action: action
      }))
      
      log(`Ação enviada: ${action}`)
    }

    function sendChat() {
      const text = document.getElementById("chat").value.trim()
      if (!text) return

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Você precisa estar conectado primeiro!")
        return
      }

      socket.send(JSON.stringify({
        type: "CHAT",
        message: text
      }))

      document.getElementById("chat").value = ''
    }

    function raiseBet() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Você precisa estar conectado primeiro!")
        return
      }
      
      socket.send(JSON.stringify({
        type: "ACTION",
        action: "RAISE",
        amount: 100
      }))
      
      log("Aumento de aposta enviado: R$ 100")
    }

    function handleChatKeyPress(event) {
      if (event.key === 'Enter') {
        sendChat()
      }
    }

    function clearLog() {
      document.getElementById("log").textContent = ''
    }

    function updateTableInfo(gameData) {
      const tableInfo = document.getElementById("tableInfo")
      const potInfo = document.getElementById("potInfo")
      
      // Exemplo de atualização - ajuste conforme a estrutura real dos dados do jogo
      if (gameData.state === "WAITING") {
        tableInfo.textContent = "Aguardando jogadores..."
        potInfo.textContent = "Pote: R$ 0"
      } else if (gameData.state === "PLAYING") {
        tableInfo.textContent = `Rodada: ${gameData.round || "Pré-flop"} | Jogadores: ${gameData.players || 0}`
        potInfo.textContent = `Pote: R$ ${gameData.pot || 0}`
      }
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', function() {
      // Focar no campo de nome ao carregar
      document.getElementById("name").focus()
      
      // Adicionar mensagem inicial no chat
      addChatMessage("Sistema", "Digite seu nome e clique em 'Entrar na Sala' para começar!", "system")
    })
  </script>
</body>
</html>
